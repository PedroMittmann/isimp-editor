<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Editor i-SIMP</title>

<style>
    .header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:30px;
padding:10px 0;
}

.logo{
height:70px;
width:auto;
object-fit:contain;
cursor:pointer;
transition:transform .35s ease;
image-rendering:auto;
}

/* animação de clique */

.logo.animar{
animation:logoSpin .6s ease;
}

@keyframes logoSpin{

0%{
transform:scale(1) rotate(0deg);
}

50%{
transform:scale(1.15) rotate(180deg);
}

100%{
transform:scale(1) rotate(360deg);
}

}
    @keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}

body{
font-family:Segoe UI, Arial;
margin:40px;
background:#f4f6f9;
color:#333;
}

h1{
margin-bottom:20px;
font-weight:600;
}

textarea{
width:100%;
height:120px;
border-radius:8px;
border:1px solid #ccc;
padding:10px;
font-family:monospace;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

th{
background:#2f6db5;
color:white;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

tr:nth-child(even){
background:#f8f9fb;
}

input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:6px 12px;
background:#2f6db5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1f4f8c;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
max-height:520px;
overflow:auto;
width:750px;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

.modal-content table{
box-shadow:none;
}

.modal-content table tr{
cursor:pointer;
}

.modal-content table tr:hover{
background:#eaf1ff;
}

.search-box{
display:flex;
gap:8px;
margin-bottom:12px;
}

.search-box input{
flex:1;
}

h3{
margin-top:0;
font-weight:600;
}

.result-box{
margin-top:20px;
}

.result-box textarea{
height:80px;
}

</style>

</head>

<body>

<div class="header">

<img 
src="/static/logo.png" 
id="logoSistema"
class="logo"
onclick="animarLogo()"
>

<h1>Editor i-SIMP</h1>

</div>

<div class="container">

<form method="POST">

<textarea name="linha">{{linha}}</textarea>

<br><br>

<button type="submit">Analisar Linha</button>

</form>

</div>


{% if resultado %}

<div class="container">

<form method="POST">

<table>

<tr>
<th>Campo</th>
<th>Posição</th>
<th>Tamanho</th>
<th>Valor Editável</th>
<th>Detalhes</th>
</tr>

{% for item in resultado %}

<tr>

<td>{{item.campo}}</td>

<td>{{item.inicio}} - {{item.fim}}</td>

<td>{{item.tamanho}}</td>

<td>
<input type="text" name="campo{{loop.index0}}" value="{{item.valor}}">
</td>

<td>

<button type="button" onclick="verDetalhes('{{item.campo}}', {{loop.index0}})">
Detalhes
</button>

</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit">Gerar Nova Linha</button>

</form>

</div>

{% endif %}


{% if nova_linha %}

<div class="container result-box">

<h3>Nova linha gerada</h3>

<textarea readonly>{{nova_linha}}</textarea>

</div>

{% endif %}


<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-content">

<h3>Códigos disponíveis</h3>

<div class="search-box">

<input 
type="text"
id="pesquisa"
placeholder="Pesquisar agente ou CNPJ...">

<button type="button" onclick="filtrarTabela()" title="Buscar">
🔍
</button>

</div>

<div id="conteudo"></div>

<br>

<button onclick="fecharModal()">Fechar</button>

</div>

</div>


<script>
let controllerBusca = null
let campoIndex = null
let campoAtual = null

const TEMPO_LOADING = 300

document.addEventListener("DOMContentLoaded", () => {

const inputPesquisa = document.getElementById("pesquisa")

if(inputPesquisa){

let timerBusca

inputPesquisa.addEventListener("input", function(){

clearTimeout(timerBusca)

timerBusca = setTimeout(()=>{
filtrarTabela()
},300)

})

}

})


function verDetalhes(campo, index){

campoIndex = index
campoAtual = campo

document.getElementById("modal").style.display = "flex"
document.getElementById("pesquisa").value = ""


mostrarLoading()

const inicio = Date.now()

if(controllerBusca){
controllerBusca.abort()
}

controllerBusca = new AbortController()

fetch("/detalhes/" + encodeURIComponent(campoAtual), {
signal: controllerBusca.signal
})

.then(res => res.json())

.then(data => {

const tempo = Date.now() - inicio

const atraso = TEMPO_LOADING - tempo

setTimeout(() => {

if(data.status === "dev"){

mostrarEmDesenvolvimento(campo)
return

}

if(!data.dados || data.dados.length === 0){

mostrarNenhumResultado()
return

}

renderTabela(data.dados)

}, atraso > 0 ? atraso : 0)

})

.catch(() => {

mostrarErro()

})
setTimeout(()=>{
document.getElementById("pesquisa").focus()
},100)
}

function mostrarLoading(){

document.getElementById("conteudo").innerHTML = `
<div style="text-align:center;padding:20px">

<div style="
width:35px;
height:35px;
border:4px solid #eee;
border-top:4px solid #2f6db5;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite"></div>

<div style="margin-top:10px;color:#666">
Carregando códigos...
</div>

</div>
`

}

function mostrarNenhumResultado(){

document.getElementById("conteudo").innerHTML = `
<div style="text-align:center;padding:20px;color:#888">
⚠️ Nenhum código encontrado
</div>
`

}

function mostrarErro(){

document.getElementById("conteudo").innerHTML = `
<div style="text-align:center;padding:20px;color:#888">
Erro ao carregar dados
</div>
`

}

function mostrarEmDesenvolvimento(campo){

document.getElementById("conteudo").innerHTML = `
<div style="text-align:center;padding:30px;color:#666">

<div style="font-size:30px;margin-bottom:10px">
🚧
</div>

<div style="font-size:16px;margin-bottom:6px">
Detalhamento em desenvolvimento
</div>

<div style="font-size:13px;color:#888">
O campo "<b>${campo}</b>" ainda não possui tabela de consulta.
</div>

</div>
`

}

function renderTabela(dados){

if(!dados || dados.length === 0){
mostrarNenhumResultado()
return
}

let colunas = Object.keys(dados[0])

let html = "<table id='tabelaCodigos'><thead><tr>"

colunas.forEach(c=>{
html += `<th>${c.replace("_"," ").toUpperCase()}</th>`
})

html += "</tr></thead><tbody>"

dados.forEach(item=>{

let codigo = item.codigo || Object.values(item)[0] || ""
html += `<tr onclick="selecionarCodigo('${codigo.replace(/'/g,"")}')">`
colunas.forEach(c=>{
html += `<td>${item[c] || ""}</td>`
})

html += "</tr>"

})

html += "</tbody></table>"

document.getElementById("conteudo").innerHTML = html
}

function selecionarCodigo(codigo){

let campo = document.querySelector(`[name="campo${campoIndex}"]`)

if(campo){
campo.value = codigo
}

fecharModal()

}

function fecharModal(){

document.getElementById("modal").style.display = "none"

}

function filtrarTabela(){

if(!campoAtual){
return
}

let termo = document.getElementById("pesquisa").value.trim()

if(termo.length < 2){
document.getElementById("conteudo").innerHTML=""
return
}

mostrarLoading()

fetch(`/buscar?campo=${encodeURIComponent(campoAtual)}&termo=${encodeURIComponent(termo)}`)

.then(res=>res.json())

.then(data=>{

if(!data.dados || data.dados.length===0){

mostrarNenhumResultado()
return

}

renderTabela(data.dados)

})

.catch(err => {

if(err.name === "AbortError"){
return
}

mostrarErro()

})

}




window.onclick = function(event){

let modal = document.getElementById("modal")

if(event.target === modal){
fecharModal()
}

}
function animarLogo(){

let logo = document.getElementById("logoSistema")

logo.classList.remove("animar")

setTimeout(()=>{
logo.classList.add("animar")
},10)

}

window.addEventListener("load", () => {

setTimeout(()=>{
animarLogo()
},300)

})

</script>

</body>
</html>
